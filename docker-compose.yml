services:
  api:
    build:
      context: .
      dockerfile: services/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./services:/app/services
      - ./packages:/app/packages
      - ./scripts:/app/scripts
      - ./data:/app/data
      - ./memory-bank:/app/memory-bank
      - ./uis:/app/uis
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - healthcore_net

  ui:
    build:
      context: ./uis
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - ./uis:/app/uis
      - ./packages:/app/packages
      - ./apps:/app/apps
      - /app/uis/website/node_modules
      - /app/uis/backoffice/landing/node_modules
      - /app/uis/backoffice/backoffice_functions/node_modules
      - /app/uis/backoffice/talent-tracker/node_modules
      - /app/uis/incident_analyzer/node_modules
      - /app/uis/supplier_directory/node_modules
      - /app/uis/website/.next
      - /app/uis/backoffice/landing/.next
    env_file:
      - .env
    depends_on:
      - api
    networks:
      - healthcore_net

  redis:
    image: redis:7
    command: ["redis-server", "--maxmemory-policy", "noeviction"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - healthcore_net

  worker:
    build:
      context: .
      dockerfile: services/Dockerfile
    working_dir: /app
    command: ["celery", "-A", "services.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    volumes:
      - ./services:/app/services
      - ./packages:/app/packages
      - ./scripts:/app/scripts
      - ./data:/app/data
      - ./memory-bank:/app/memory-bank
      - ./uis:/app/uis
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - healthcore_net

  flower:
    build:
      context: .
      dockerfile: services/Dockerfile
    working_dir: /app
    command: ["celery", "-A", "services.celery_app", "flower", "--port=5555"]
    ports:
      - "5555:5555"
    volumes:
      - ./services:/app/services
      - ./packages:/app/packages
      - ./scripts:/app/scripts
      - ./data:/app/data
      - ./memory-bank:/app/memory-bank
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - healthcore_net

  test:
    build:
      context: .
      dockerfile: services/Dockerfile
    volumes:
      - ./services:/app/services
      - ./packages:/app/packages
      - ./scripts:/app/scripts
      - ./data:/app/data
      - ./memory-bank:/app/memory-bank
      - ./uis:/app/uis
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml
    env_file:
      - .env
    command: ["uv", "run", "pytest"]
    profiles:
      - test
    networks:
      - healthcore_net

networks:
  healthcore_net:
    name: healthcore_net

volumes:
  redis_data:
