[project]
name = "healthcore-incidents-shared"
version = "0.1.0"
description = "Shared incident validation logic for HealthCore scripts and API"
requires-python = ">=3.12"
dependencies = [
    "pandas>=2.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["healthcore_incidents"]
